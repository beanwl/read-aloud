<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Speak Selection</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <h1>Speak Selection</h1>
  <p class="hint">Highlight text → right-click → <b>Speak Selection</b></p>

  <div class="row primary">
    <button id="stop" type="button" class="stop">Stop</button>
    <button id="resume" type="button" class="resume">Resume</button>
  </div>
  <div class="row compact">
    <button id="test" type="button" class="tiny">Test</button>
    <button id="open-options" type="button" class="tiny secondary">Settings</button>
  </div>
  <p id="status" class="status"></p>
  <script src="popup.js"></script>
</body>
</html>
